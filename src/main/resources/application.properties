spring.application.name=turngo
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Para que tome las variables de entorno, se deben agregar al PATH. Se puede cambiar en el IDE igualmente. No utiliza un .env

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Cloudflare Turnstile (en desarrollo usamos la secret hardcodeada)
cloudflare.turnstile.secretKey=${CF_TURNSTILE_SECRET}

# =======================
# Configuración de correo
# =======================
# Los valores reales se toman desde variables de entorno (.env + spring-dotenv)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Dirección por defecto del remitente (por defecto usamos el propio MAIL_USERNAME)
turngo.mail.from=${MAIL_USERNAME}

# Flag para habilitar/deshabilitar envío de correos (útil en desarrollo/tests)
turngo.mail.enabled=true